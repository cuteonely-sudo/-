<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경찰 민원포털</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo">
        경찰 민원포털
    </div>

    <div class="search">
        <input type="text" placeholder="민원, 법령, 정보 검색">
        <button>검색</button>
    </div>

<div class="user">
    <span id="clock"></span>
    <button onclick="logout()">로그아웃</button>
</div>
</header>

<nav class="topmenu">
    <ul>
        <li>알림/소식</li>
        <li>정보공개</li>
        <li>법령/정책</li>
        <li>기관소개</li>
    </ul>
</nav>

<div class="container">

    <aside class="sidebar">

        <div class="side-title">정보 메뉴</div>

        <ul>
            <li>정보공개청구</li>
            <li>사전정보공표</li>
            <li>법령 정보</li>
        </ul>

    </aside>

    <main class="main">

        <section class="banner">
            <h1>국민의 안전을 위한 신뢰받는 경찰 서비스</h1>
            <p>24시간 온라인 정보 서비스를 제공합니다.</p>
        </section>

        <section class="notice">

            <h2>알림 / 소식</h2>

            <table>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>등록일</th>
                </tr>

                <tr>
                    <td>1</td>
                    <td>시스템 점검 안내</td>
                    <td>2026-07-06</td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>정보서비스 개선 안내</td>
                    <td>2026-07-05</td>
                </tr>
            </table>

        </section>

        <section class="info">

            <div class="box">
                <h3>정보공개</h3>
                <p>정보공개청구, 사전정보공표</p>
            </div>

            <div class="box">
                <h3>법령/정책</h3>
                <p>경찰 관련 법령 및 정책</p>
            </div>

            <div class="box">
                <h3>기관소개</h3>
                <p>조직도, 인사말, 연락처</p>
            </div>

        </section>

    </main>

</div>

<footer>
    © 2026 경찰 민원포털
</footer>

<script src="script.js"></script>

</body>
</html>
